controller_manager:
  ros__parameters:
    update_rate: 100  # Hz
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

diff_drive_controller:
  ros__parameters:
    # Joint names from your URDF macro: ${prefix}_wheel_joint
    left_wheel_names: ["front_left_wheel_joint", "rear_left_wheel_joint"]
    right_wheel_names: ["front_right_wheel_joint", "rear_right_wheel_joint"]

    # Calculated from your Xacro properties:
    # base_width (0.4) + 2 * wheel_ygap (0.05) = 0.5
    wheel_separation: 0.5
    
    # wheel_radius value (0.1)
    wheel_radius: 0.1

    # Odometry and Frames
    odom_frame_id: odom
    base_frame_id: base_footprint
    
    # In Jazzy/Harmonic, set this to false to accept standard Twist messages
    use_stamped_vel: false

    # Limits (Optional but recommended for smoother driving)
    linear:
      x:
        has_velocity_limits: true
        max_velocity: 1.0
        min_velocity: -1.0
        has_acceleration_limits: true
        max_acceleration: 1.0
    angular:
      z:
        has_velocity_limits: true
        max_velocity: 2.0
        min_velocity: -2.0
        has_acceleration_limits: true
        max_acceleration: 2.0